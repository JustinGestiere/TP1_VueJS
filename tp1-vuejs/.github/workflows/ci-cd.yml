name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
        
    - name: Run frontend tests
      run: |
        cd frontend
        npm run test:run
        
    - name: Build frontend
      run: |
        cd frontend
        npm run build

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: tp1_vuejs_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
        
    - name: Install backend dependencies
      run: |
        cd backend
        npm ci
        
    - name: Test database connection only
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: tp1_vuejs_test
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_DIALECT: postgres
      run: |
        cd backend
        npm run test-db

  build-and-deploy:
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build and push Docker images
      run: |
        # Build frontend
        docker build -t ${{ secrets.DOCKER_REGISTRY }}/tp1-frontend:latest -f frontend/Dockerfile.test ./frontend
        
        # Build backend
        docker build -t ${{ secrets.DOCKER_REGISTRY }}/tp1-backend:latest -f backend/Dockerfile.test ./backend
        
        # Push images
        echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
        docker push ${{ secrets.DOCKER_REGISTRY }}/tp1-frontend:latest
        docker push ${{ secrets.DOCKER_REGISTRY }}/tp1-backend:latest
        
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /opt/tp1-vuejs
          
          # Pull new images
          docker-compose pull
          
          # Restart services
          docker-compose down
          docker-compose up -d
          
          # Clean old images
          docker image prune -f
